apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tuppr-upgrades
  namespace: flux-system
spec:
  interval: 10m
  path: clusters/main/kubernetes/core/tuppr-upgrades/app
  prune: true
  dependsOn:
    - name: tuppr
  sourceRef:
    kind: GitRepository
    name: cluster
